services:
  mysql:
    image: mysql:8.0
    container_name: singitronic_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: singitronic_pass
      MYSQL_DATABASE: singitronic_nextjs
    ports:
      - "3306:3306"
    volumes:
      - singitronic_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psingitronic_pass"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  singitronic_mysql_data:
